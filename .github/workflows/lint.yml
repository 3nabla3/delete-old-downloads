name: Lint

on:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6.0.2

    - name: Install shellcheck
      run: sudo apt-get install -y shellcheck

    - name: Run shellcheck
      run: shellcheck usr/bin/delete_old_downloads.sh DEBIAN/postinst DEBIAN/prerm
