name: Build and publish packages

on:
  push:
    tags:
      - '*'

jobs:
  build-deb:
    permissions: write-all
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6.0.2

    - name: Set up Debian package building environment
      run: |
        sudo apt-get update
        sudo apt-get install -y dpkg-dev

    - name: Build Debian package
      run: |
        version=$(echo ${{ github.ref_name }} | tr -d v)
        echo "Version: $version" >> DEBIAN/control
        cd ../
        dpkg-deb --build delete-old-downloads
        mv delete-old-downloads.deb delete-old-downloads/

    - name: Upload Debian package artifact
      uses: actions/upload-artifact@v7.0.1
      with:
        name: delete-old-downloads.deb
        path: delete-old-downloads.deb

    - name: Upload binaries to release
      uses: svenstaro/upload-release-action@2.11.5
      with:
        file: delete-old-downloads.deb
        asset_name: delete-old-downloads.deb
        tag: ${{ github.ref }}
        overwrite: true
        body: "Latest release of the package"

  publish-aur:
    runs-on: ubuntu-latest
    needs: build-deb

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6.0.2

    - name: Update PKGBUILD version and checksum
      run: |
        version=$(echo ${{ github.ref_name }} | tr -d v)
        sed -i "s/^pkgver=.*/pkgver=$version/" PKGBUILD

        source_url="https://github.com/3nabla3/delete-old-downloads/archive/refs/tags/${{ github.ref_name }}.tar.gz"
        wget -q -O source.tar.gz "$source_url"
        checksum=$(sha256sum source.tar.gz | awk '{print $1}')
        sed -i "s/^sha256sums=.*/sha256sums=('$checksum')/" PKGBUILD

    - name: Publish to AUR
      uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
      with:
        pkgname: delete-old-downloads
        pkgbuild: ./PKGBUILD
        commit_username: ${{ secrets.AUR_USERNAME }}
        commit_email: ${{ secrets.AUR_EMAIL }}
        ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        commit_message: "Update to ${{ github.ref_name }}"
        ssh_keyscan_types: rsa,ecdsa,ed25519
